name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main
      - principal
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Hugging Face Hub
        run: pip install --upgrade huggingface_hub

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ.get("HF_TOKEN")
          if not token:
              raise SystemExit("Falta el secreto HF_TOKEN en GitHub Actions")

          api = HfApi(token=token)
          api.upload_folder(
              folder_path=".",
              repo_id="Pedroalbeldavalles/Agente-Pulse14",
              repo_type="space",
              ignore_patterns=[
                  ".git/*",
                  ".github/*",
                  "__pycache__/*",
                  "*.pyc",
                  ".env",
                  "proyectos/*",
                  "outputs/*"
              ],
              commit_message="Sincronización desde GitHub mediante hub-sync"
          )
          PY
