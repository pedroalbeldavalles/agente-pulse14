<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Motor Pulse14 Núcleo v1</title>
<link rel="stylesheet" href="/interfaz/styles.css?v=1">
</head>
<body>
<header><h1>Motor Pulse14 Núcleo v1</h1><p>Crear proyecto, cargar imágenes y generar paquete IA del Cerebro</p></header>
<main>
<section class="panel">
<h2>1. Proyecto</h2>
<input id="nombre" value="Proyecto Pulse14">
<button id="crear">Crear proyecto</button>
<div id="pid" class="status">Sin proyecto creado.</div>
</section>
<section class="panel">
<h2>2. Imágenes</h2>
<input id="imagenes" type="file" accept="image/*" multiple disabled>
<button id="subir" disabled>Subir imágenes al proyecto</button>
<div id="galeria" class="gallery"></div>
</section>
<section class="panel">
<h2>3. Cerebro / Paquete IA</h2>
<label>Máximo colores</label><input id="colores" type="number" value="15" min="2" max="64">
<label>Instrucciones</label><textarea id="instrucciones" placeholder="Ej: mantener simetría, flores más grandes, eliminar detalles pequeños..."></textarea>
<button id="paquete" disabled>Crear paquete IA</button>
</section>
<section class="panel grid">
<div><h2>project.json</h2><pre id="json">Aún no hay proyecto.</pre></div>
<div><h2>Prompt generado</h2><pre id="prompt">Aún no hay paquete IA.</pre></div>
</section>
</main>
<script src="/interfaz/app.js?v=1"></script>
</body>
</html>
